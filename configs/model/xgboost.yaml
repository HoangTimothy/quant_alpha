# XGBoost
model:
  name: xgboost
  params:
    n_estimators: 1000
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    min_child_weight: 10
    gamma: 0.1
    scale_pos_weight: 1.0
    tree_method: hist
    random_state: 42
    early_stopping_rounds: 50
